<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Edouard Peyrouty</title>
    <link rel="stylesheet" href="assets/style/style.css">
    <script src="assets/js/layout.js" defer></script>
    <script type="module" src="assets/js/projets.js" defer></script>
    <script>
        (function () {
            const isGithubPages = location.hostname.endsWith("github.io");
            const base = document.createElement("base");
            base.href = isGithubPages ? "/portfolio/" : "/";
            document.head.prepend(base);
        })();
    </script>
</head>
<body>
    <!-- Navigation bar -->
    <nav id="header"></nav>

    <main>     
        <h1 style="margin: 0px 0px 20px 60px;">Mes Projets</h1>
        <div id="projet-layout">
            <div class="grid-container-projects">
                <a class="color-box" data-src="/projets/projet1.html">
                    <h2>Visualisation météo</h2>
                    <div><img src="assets/images/projets/projet1/carte.png" alt="Carte météorologique"></div>
                </a>
                <a class="color-box" data-src="/projets/projet2.html">
                    <h2>Automatisation CI/CD</h2>
                    <div><img src="assets/images/projets/projet2/illustration.png" alt="Carte météorologique"></div>
                </a>
                <a  class="color-box" data-src="/projets/projet3.html">
                    <h2>Jeu de la vie</h2>
                    <div><canvas id="canvas-preview"></canvas></div>
                </a>
                <a  class="color-box" data-src="/projets/app-gestion-db.html">
                    <h2>Gestion des entreprises</h2>
                    <div><img src="assets/images/projets/app-gestion-db/companie.png" alt="Interface de gestion des entreprises"></div>
                </a>
                <a  class="color-box" data-src="/projets/microservices-nestjs.html">
                    <h2>Microservices NestJS</h2>
                    <div><img src="assets/images/projets/microservices-nestjs/illustration.png" alt="Schéma de l'architecture microservices et de l'API Gateway"></div>
                </a>
                <a  class="color-box" data-src="/projets/todolist.html">
                    <h2>Todo List</h2>
                    <div><img src="assets/images/projets/todolist/todos.png" alt="Schéma de l'architecture microservices et de l'API Gateway"></div>
                </a>
            </div>

            <div id="container-projet-details">
                <button id="btn-close">✕</button>
                <div id="projet-details" class="color-box"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer id="footer"
    scroll-behavior: smooth;
    ></footer>
</body>
</html>
