<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Edouard Peyrouty</title>
    <link rel="stylesheet" href="assets/style/style.css">
    <script src="assets/js/layout.js" defer></script>
    <script type="module" src="assets/js/index.js" defer></script>
    <script>
        (function () {
            const isGithubPages = location.hostname.endsWith("github.io");
            const base = document.createElement("base");
            base.href = isGithubPages ? "/portfolio/" : "/";
            document.head.prepend(base);
        })();
    </script>
</head>
<body>

    <!-- Gestion de l'animation du background -->
    <canvas id="bg-canvas" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -9999;
        pointer-events: none;
    "></canvas>

    <!-- Navigation bar -->
    <nav id="header"></nav>

    <main>
        <div class="color-box" style="background-color: rgba(255, 255, 255, 0.5);">
            <section>
                    <h1>Edouard Peyrouty</h1>
                    <p class="subtitle">Développeur d'applications - Alternant en BUT Informatique</p>
                    <p class="experience">2 ans d'expérience en entreprise</p>
                    <p class="search">Recherche une alternance en cycle ingénieur informatique à partir de septembre 2026</p>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer id="footer"></footer>
</body>
</html>
